<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3daee9"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
  </defs>

  <!-- Rounded app tile background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bg)"/>

  <!-- Document -->
  <rect x="28" y="22" width="72" height="84" rx="6" fill="url(#page)" stroke="#c8d6e5" stroke-width="2"/>

  <!-- Markdown heading bar -->
  <rect x="38" y="34" width="36" height="6" rx="2" fill="#3daee9"/>
  <rect x="38" y="46" width="52" height="4" rx="2" fill="#bdc3c7"/>
  <rect x="38" y="54" width="48" height="4" rx="2" fill="#bdc3c7"/>
  <rect x="38" y="62" width="44" height="4" rx="2" fill="#bdc3c7"/>

  <!-- Bold M glyph for Markdown -->
  <text x="64" y="92" font-family="sans-serif" font-size="28" font-weight="bold"
        fill="#2980b9" text-anchor="middle">M</text>

  <!-- Preview magnifier -->
  <circle cx="88" cy="88" r="16" fill="#ffffff" stroke="#2980b9" stroke-width="3"/>
  <circle cx="88" cy="88" r="6" fill="none" stroke="#3daee9" stroke-width="2"/>
  <line x1="99" y1="99" x2="108" y2="108" stroke="#2980b9" stroke-width="4" stroke-linecap="round"/>
</svg>
